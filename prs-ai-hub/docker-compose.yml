version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prs_db
      POSTGRES_USER: prs_user
      POSTGRES_PASSWORD: prs_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prs_user -d prs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  intake-agent:
    build: ./backend/agents/intake
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}

  contract-agent:
    build: ./backend/agents/contract
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}

  sku-agent:
    build: ./backend/agents/sku
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}

  gateway:
    build: ./backend/gateway
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - INTAKE_AGENT_URL=http://intake-agent:8001
      - CONTRACT_AGENT_URL=http://contract-agent:8002
      - SKU_AGENT_URL=http://sku-agent:8003
      - DATABASE_URL=postgresql+asyncpg://prs_user:prs_password@postgres:5432/prs_db
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:3000
      - DATA_DIR=/app/data
    depends_on:
      postgres:
        condition: service_healthy
      intake-agent:
        condition: service_started
      contract-agent:
        condition: service_started
      sku-agent:
        condition: service_started
    volumes:
      - ./data:/app/data:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - gateway

volumes:
  postgres_data:
  redis_data:
